<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vistoria de Imóvel — WeCare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --navy: #0d1b2e;
  --navy-light: #162844;
  --gold: #c9a065;
  --gold-light: #dbb980;
  --cream: #ede8dc;
  --cream-dark: #ddd7c8;
  --white: #ffffff;
  --gray-50: #f9f9f7;
  --gray-100: #f0ede6;
  --gray-200: #e2ddd3;
  --gray-300: #c8c1b4;
  --gray-400: #a09690;
  --gray-500: #7a7268;
  --gray-600: #5a5450;
  --gray-700: #3a3530;
  --amber: #f59e0b;
  --amber-light: #fef3c7;
  --amber-border: #fcd34d;
  --red: #dc2626;
  --red-light: #fee2e2;
  --green: #16a34a;
  --green-light: #dcfce7;
  --blue: #2563eb;
  --blue-light: #dbeafe;
  --font: 'Plus Jakarta Sans', sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(13,27,46,0.10);
  --shadow-lg: 0 8px 32px rgba(13,27,46,0.16);
  --sidebar-w: 260px;
  --header-h: 60px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--gray-50);
  color: var(--navy);
  min-height: 100vh;
}

/* ─── HEADER ─── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--white);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.3px;
}
.logo-dot {
  width: 32px; height: 32px;
  background: var(--gold);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 800;
  color: var(--navy);
}
.header-imovel {
  font-size: 12px;
  color: var(--gold-light);
  font-weight: 500;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--white);
  font-size: 20px;
  cursor: pointer;
  padding: 8px;
}

/* ─── PROGRESS BAR ─── */
.progress-bar-wrap {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0;
  background: var(--navy-light);
  padding: 8px 16px;
  z-index: 190;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-label {
  font-size: 11px;
  color: var(--gold-light);
  font-weight: 600;
  white-space: nowrap;
}

/* ─── LAYOUT ─── */
.layout {
  display: flex;
  padding-top: calc(var(--header-h) + 38px);
}

/* ─── SIDEBAR ─── */
.sidebar {
  position: fixed;
  top: calc(var(--header-h) + 38px);
  left: 0;
  width: var(--sidebar-w);
  height: calc(100vh - var(--header-h) - 38px);
  background: var(--white);
  border-right: 1px solid var(--gray-200);
  overflow-y: auto;
  z-index: 150;
  transition: transform 0.3s ease;
}
.sidebar-inner { padding: 16px 0; }
.sidebar-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  color: var(--gray-400);
  text-transform: uppercase;
  padding: 0 16px 12px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  text-decoration: none;
  color: var(--gray-600);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  cursor: pointer;
}
.nav-item:hover { background: var(--gray-50); color: var(--navy); }
.nav-item.active { background: var(--cream); color: var(--navy); border-left-color: var(--gold); font-weight: 600; }
.nav-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.nav-check {
  margin-left: auto;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--green);
  color: white;
  font-size: 10px;
  display: none;
  align-items: center;
  justify-content: center;
}
.nav-item.done .nav-check { display: flex; }

/* ─── MAIN CONTENT ─── */
.main {
  flex: 1;
  margin-left: var(--sidebar-w);
  padding: 24px 24px 120px;
  max-width: 900px;
}

/* ─── SECTION CARD ─── */
.section-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 24px;
  overflow: hidden;
  scroll-margin-top: calc(var(--header-h) + 50px);
}
.section-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--gray-100);
}
.section-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.section-title {
  flex: 1;
  font-size: 15px;
  font-weight: 700;
  color: var(--navy);
}
.section-num {
  font-size: 11px;
  color: var(--gray-400);
  font-weight: 600;
}
.section-chevron {
  color: var(--gray-400);
  transition: transform 0.2s;
  font-size: 14px;
}
.section-card.collapsed .section-chevron { transform: rotate(-90deg); }
.section-body { padding: 20px; }
.section-card.collapsed .section-body { display: none; }

/* ─── FORM ELEMENTS ─── */
.form-row { margin-bottom: 16px; }
.form-row label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-row input[type="text"],
.form-row input[type="date"],
.form-row input[type="number"],
.form-row textarea,
.form-row select {
  width: 100%;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-family: var(--font);
  font-size: 14px;
  color: var(--navy);
  background: var(--white);
  transition: border-color 0.2s;
  outline: none;
}
.form-row input:focus,
.form-row textarea:focus,
.form-row select:focus { border-color: var(--gold); }
.form-row textarea { resize: vertical; min-height: 80px; }
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.form-grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

/* ─── STATUS BADGE ─── */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 600;
}
.status-draft { background: var(--gray-100); color: var(--gray-500); }
.status-sent { background: var(--green-light); color: var(--green); }

/* ─── WIFI ROW ─── */
.wifi-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.wifi-row .form-row { flex: 1; margin-bottom: 0; }
.toggle-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  padding-top: 18px;
}
.toggle-label { font-size: 12px; font-weight: 600; color: var(--gray-600); }
.toggle-switch {
  position: relative;
  width: 44px; height: 24px;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--gray-300);
  border-radius: 99px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-track::after {
  content: '';
  position: absolute;
  left: 3px; top: 3px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: white;
  transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle-switch input:checked + .toggle-track { background: var(--green); }
.toggle-switch input:checked + .toggle-track::after { transform: translateX(20px); }

/* ─── RADIO PILLS ─── */
.pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
.pill-label {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 99px;
  border: 1.5px solid var(--gray-200);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.pill-label:hover { border-color: var(--gray-400); }
.pill-label input[type="radio"] { display: none; }
.pill-ok { color: var(--green); }
.pill-warn { color: var(--amber); }
.pill-bad { color: var(--red); }
.pill-label:has(input:checked).pill-ok { background: var(--green-light); border-color: var(--green); }
.pill-label:has(input:checked).pill-warn { background: var(--amber-light); border-color: var(--amber-border); }
.pill-label:has(input:checked).pill-bad { background: var(--red-light); border-color: var(--red); }

/* ─── EQUIPMENT ITEM ─── */
.equip-item {
  border: 1px solid var(--gray-100);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}
.equip-item:has(.pill-bad input:checked) { border-color: var(--red); background: #fff8f8; }
.equip-item:has(.pill-warn input:checked) { border-color: var(--amber-border); background: #fffdf0; }
.equip-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.equip-name { font-size: 14px; font-weight: 600; color: var(--navy); }
.equip-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.btn-camera {
  background: none;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  cursor: pointer;
  color: var(--gray-500);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
}
.btn-camera:hover { border-color: var(--gold); color: var(--gold); }
.equip-obs input {
  width: 100%;
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  padding: 7px 10px;
  font-family: var(--font);
  font-size: 13px;
  color: var(--gray-700);
  background: var(--gray-50);
  outline: none;
}
.equip-obs input:focus { border-color: var(--gold); }
.comodo-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--gold);
  margin: 18px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--gray-100);
}
.comodo-title:first-child { margin-top: 0; }

/* ─── INVENTORY TABLE ─── */
.inv-table { width: 100%; border-collapse: collapse; }
.inv-table th {
  font-size: 11px;
  font-weight: 700;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 8px 10px;
  text-align: left;
  border-bottom: 2px solid var(--gray-100);
}
.inv-table td {
  padding: 10px 10px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 13px;
  vertical-align: middle;
}
.inv-table tr:last-child td { border-bottom: none; }
.inv-table tr.row-alert { background: var(--amber-light); }
.inv-table tr.row-alert td { color: var(--gray-700); }
.qty-diff {
  font-weight: 700;
  font-size: 13px;
}
.qty-diff.neg { color: var(--red); }
.qty-diff.pos { color: var(--green); }
.qty-diff.zero { color: var(--gray-400); }
.inv-table input[type="number"] {
  width: 70px;
  border: 1.5px solid var(--gray-200);
  border-radius: 6px;
  padding: 6px 8px;
  font-family: var(--font);
  font-size: 13px;
  text-align: center;
  outline: none;
}
.inv-table input[type="number"]:focus { border-color: var(--gold); }
.inv-table input[type="text"] {
  width: 100%;
  min-width: 120px;
  border: 1.5px solid var(--gray-200);
  border-radius: 6px;
  padding: 6px 8px;
  font-family: var(--font);
  font-size: 13px;
  outline: none;
}
.inv-table input[type="text"]:focus { border-color: var(--gold); }
.table-wrap { overflow-x: auto; }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { background: var(--gold-light); }
.btn-outline {
  background: none;
  border: 1.5px solid var(--gray-200);
  color: var(--gray-600);
}
.btn-outline:hover { border-color: var(--navy); color: var(--navy); }
.btn-danger { background: var(--red-light); color: var(--red); border: none; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ─── CHECKLIST ─── */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-100);
}
.check-item:last-child { border-bottom: none; }
.check-item label {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  flex: 1;
  font-size: 14px;
  font-weight: 500;
  color: var(--navy);
}
.check-item input[type="checkbox"] {
  width: 20px; height: 20px;
  accent-color: var(--green);
  cursor: pointer;
  flex-shrink: 0;
}
.check-obs {
  flex: 1;
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  padding: 7px 10px;
  font-family: var(--font);
  font-size: 12px;
  color: var(--gray-600);
  outline: none;
  min-width: 0;
}
.check-obs:focus { border-color: var(--gold); }

/* ─── CONDOMÍNIO ─── */
.cond-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-100);
  flex-wrap: wrap;
}
.cond-item:last-child { border-bottom: none; }
.cond-label {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 200px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}
.cond-item input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--navy);
  cursor: pointer;
  flex-shrink: 0;
}
.cond-obs {
  flex: 1;
  border: 1px solid var(--gray-200);
  border-radius: 6px;
  padding: 7px 10px;
  font-family: var(--font);
  font-size: 12px;
  outline: none;
  min-width: 120px;
}
.cond-obs:focus { border-color: var(--gold); }

/* ─── PRAIA ─── */
#sec-praia { display: none; }

/* ─── DECORAÇÃO ─── */
.deco-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--gray-100);
  flex-wrap: wrap;
}
.deco-item:last-child { border-bottom: none; }
.deco-room { font-size: 14px; font-weight: 600; min-width: 110px; padding-top: 6px; }
.deco-controls { display: flex; flex-direction: column; gap: 8px; flex: 1; }

/* ─── PENDÊNCIAS ─── */
.pendencia-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto auto;
  gap: 8px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--gray-100);
}
.pendencia-row:last-child { border-bottom: none; }
.urg-alta { background: var(--red-light); color: var(--red); font-weight: 700; }
.urg-media { background: var(--amber-light); color: #92400e; font-weight: 700; }
.urg-baixa { background: var(--blue-light); color: var(--blue); font-weight: 700; }
select.urg-select {
  border: 1.5px solid var(--gray-200);
  border-radius: 6px;
  padding: 7px 8px;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
}

/* ─── SIGNATURE ─── */
#sig-canvas {
  width: 100%;
  height: 150px;
  border: 2px dashed var(--gray-200);
  border-radius: var(--radius-sm);
  cursor: crosshair;
  background: var(--gray-50);
  display: block;
  touch-action: none;
}
#sig-canvas.has-sig { border-style: solid; border-color: var(--navy); }

/* ─── FLOATING SUBMIT ─── */
.float-submit {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(transparent, rgba(249,249,247,0.98) 30%);
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
}
.float-submit-btn {
  flex: 1;
  padding: 16px;
  background: var(--gold);
  color: var(--navy);
  border: none;
  border-radius: var(--radius);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 20px rgba(201,160,101,0.4);
  transition: all 0.15s;
}
.float-submit-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
.autosave-indicator {
  font-size: 11px;
  color: var(--gray-400);
  white-space: nowrap;
  text-align: center;
}

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(13,27,46,0.6);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--white);
  border-radius: var(--radius);
  max-width: 560px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--gray-100);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 17px; font-weight: 700; color: var(--navy); }
.modal-close {
  background: none; border: none;
  color: var(--gray-400); font-size: 18px;
  cursor: pointer; padding: 4px;
}
.modal-body { padding: 20px; }
.modal-section { margin-bottom: 16px; }
.modal-section-title {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--gray-400); margin-bottom: 8px;
}
.modal-alert-item {
  display: flex; align-items: flex-start;
  gap: 8px; padding: 8px 0;
  border-bottom: 1px solid var(--gray-100);
  font-size: 13px;
}
.modal-alert-item:last-child { border-bottom: none; }
.modal-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--gray-100);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--navy);
  color: var(--white);
  padding: 10px 20px;
  border-radius: 99px;
  font-size: 13px; font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 400;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── SECTION COLORS ─── */
.ic-cab { background: #eef2ff; color: #4f46e5; }
.ic-acs { background: #ecfdf5; color: #16a34a; }
.ic-eqp { background: #fff7ed; color: #ea580c; }
.ic-inv { background: #f0f9ff; color: #0284c7; }
.ic-ext { background: #fdf4ff; color: #9333ea; }
.ic-enx { background: #fff1f2; color: #e11d48; }
.ic-lim { background: #f0fdf4; color: #15803d; }

// ═══════════════════════════════════════════════════════

function _qtdComodo(v){if(v===true)return 1;if(!v)return 0;const n=parseInt(v);return isNaN(n)?0:n;}

function getComodos(im) {
  const list = [];
  const nq = parseInt(im.quartos) || 0;
  for (let i = 1; i <= nq; i++) list.push(nq > 1 ? 'Quarto ' + i : 'Quarto');
  const ns = parseInt(im.salas != null ? im.salas : 1) || 0;
  for (let i = 1; i <= ns; i++) list.push(ns > 1 ? 'Sala ' + i : 'Sala');
  const nc = _qtdComodo(im.cozinha !== undefined ? im.cozinha : 1);
  for (let i = 1; i <= nc; i++) list.push(nc > 1 ? 'Cozinha ' + i : 'Cozinha');
  const nbc = parseInt(im.banheirosCompletos) || parseInt(im.banheiros) || 0;
  for (let i = 1; i <= nbc; i++) list.push(nbc > 1 ? 'Banheiro Completo ' + i : 'Banheiro Completo');
  const nbv = parseInt(im.banheirosLavabo) || 0;
  for (let i = 1; i <= nbv; i++) list.push(nbv > 1 ? 'Lavabo ' + i : 'Lavabo');
  const nl = _qtdComodo(im.lavanderia);
  for (let i = 1; i <= nl; i++) list.push(nl > 1 ? 'Lavanderia ' + i : 'Lavanderia');
  const na = _qtdComodo(im.areaExterna);
  for (let i = 1; i <= na; i++) list.push(na > 1 ? 'Área Externa ' + i : 'Área Externa');
  return list;
}

const COMODO_ICONS = {
  'Quarto': 'fa-bed', 'Sala': 'fa-couch', 'Cozinha': 'fa-utensils',
  'Banheiro': 'fa-bath', 'Lavabo': 'fa-sink', 'Lavanderia': 'fa-shirt', 'Área Externa': 'fa-sun'
};

function getComodoIcon(nome) {
  for (const k of Object.keys(COMODO_ICONS)) {
    if (nome.startsWith(k)) return COMODO_ICONS[k];
  }
  return 'fa-door-open';
}

function buildComodos() {
  const comodos = getComodos(currentImovel);
  const container = document.getElementById('comodos-container');
  const navContainer = document.getElementById('nav-comodos');
  let sectionsHtml = '';

  comodos.forEach((nome, idx) => {
    const icon = getComodoIcon(nome);
    sectionsHtml += `
    <div class="section-card" id="sec-comodo-${idx}">
      <div class="section-header" onclick="toggleSection('sec-comodo-${idx}')">
        <div class="section-icon ic-dec"><i class="fa-solid ${icon}"></i></div>

            <label id="add-video-btn-${idx}" style="width:72px;height:72px;border:2px dashed var(--gray-300);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--gray-400);gap:4px;background:var(--gray-100)">

              <input type="file" accept="video/*,image/*" style="display:none" onchange="addVideo(${idx}, event)">
            </label>
          </div>
        </div>
        <div class="form-row">
          <label>Irregularidades encontradas</label>
          <textarea id="irreg-${idx}" rows="3" placeholder="Descreva problemas, danos ou itens com defeito neste cômodo..." oninput="updateProgress()" style="resize:vertical"></textarea>
        </div>
      </div>
    </div>`;

    navHtml += `
    <a class="nav-item" href="#sec-comodo-${idx}" onclick="navClick(this)">
      <span class="nav-icon ic-dec"><i class="fa-solid ${icon}"></i></span>
      ${nome}
      <span class="nav-check"><i class="fa-solid fa-check"></i></span>
    </a>`;
  });

  container.innerHTML = sectionsHtml;
  navContainer.innerHTML = navHtml;
}

function addVideo(idx, event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!videoFiles[idx]) videoFiles[idx] = [];
  if (videoFiles[idx].length >= 3) {
    showToast('Máximo de 3 vídeos por cômodo.');
    event.target.value = '';
    return;
  }
  videoFiles[idx].push(file);
  renderVideoGrid(idx);
  event.target.value = '';
  updateProgress();
}

function removeVideo(idx, vidIdx) {
  if (videoFiles[idx]) videoFiles[idx].splice(vidIdx, 1);
  renderVideoGrid(idx);
  updateProgress();
}

function renderVideoGrid(idx) {
  const grid = document.getElementById('videos-grid-' + idx);
  const addBtn = document.getElementById('add-video-btn-' + idx);
  if (!grid) return;

  // Remove existing thumbnails
  grid.querySelectorAll('.video-thumb').forEach(el => el.remove());

  const files = videoFiles[idx] || [];
  files.forEach((file, vi) => {
    const isVideo = file.type.startsWith('video/');
    const url = URL.createObjectURL(file);
    const div = document.createElement('div');
    div.className = 'video-thumb';
    div.style.cssText = 'position:relative;width:72px;height:72px;border-radius:var(--radius-sm);overflow:hidden;background:#000;border:1px solid var(--gray-200);flex-shrink:0';
    div.innerHTML = isVideo
      ? `<video src="${url}" style="width:100%;height:100%;object-fit:cover" muted playsinline></video>`
      : `<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
    const btn = document.createElement('button');
    btn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
    btn.style.cssText = 'position:absolute;top:3px;right:3px;background:rgba(0,0,0,.65);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0';
    btn.onclick = () => removeVideo(idx, vi);
    div.appendChild(btn);
    grid.insertBefore(div, addBtn);
  });

  if (addBtn) addBtn.style.display = files.length >= 3 ? 'none' : 'flex';
}

function _carregarImovelReal() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) return;
  try {
    const lista = JSON.parse(localStorage.getItem('wc_imoveis') || '[]');
    const im = lista.find(i => String(i.id) === String(id));
    if (!im) return;
    currentImovel = {
      id: im.id,
      nome: im.nome || im.id,
      endereco: im.endereco || '',
      quartos: im.quartos || 0,
      banheiros: im.banheiros || 0,
      banheirosCompletos: im.banheirosCompletos || 0,
      banheirosLavabo: im.banheirosLavabo || 0,
      salas: im.salas != null ? im.salas : 1,
      cozinha: im.cozinha !== undefined ? im.cozinha : 1,
      lavanderia: im.lavanderia || 0,
      areaExterna: im.areaExterna || 0,
      camas: im.camas || [],
    };
  } catch(e) { console.warn('Erro ao carregar imóvel real', e); }
}

document.addEventListener('DOMContentLoaded', () => {

function updateProgress() {
  const comodos = getComodos(currentImovel);
  const total = 1 + comodos.length + 1; // cabeçalho + cômodos + conclusão
  let done = 0;

  // Cabeçalho
  const cabOk = !!(document.getElementById('field-data').value &&
    document.getElementById('field-vistoriador').value.trim());
  if (cabOk) done++;
  const cabNav = document.querySelector('.nav-item[href="#sec-cab"]');
  if (cabNav) cabNav.classList.toggle('done', cabOk);

  // Cômodos — marcado como done se tiver pelo menos 1 vídeo OU irregularidade preenchida
  comodos.forEach((nome, idx) => {
    const hasVideo = (videoFiles[idx] || []).length > 0;
    const irreg = (document.getElementById('irreg-' + idx) || {}).value || '';
    const isDone = hasVideo || irreg.trim().length > 0;
    if (isDone) done++;
    const navItems = document.querySelectorAll('#nav-comodos .nav-item');
    if (navItems[idx]) navItems[idx].classList.toggle('done', isDone);
  });

  // Conclusão
  const concOk = !!(document.querySelector('input[name="apto"]:checked') &&
    document.getElementById('field-nome-conclusao').value.trim());
  if (concOk) done++;
  const concNav = document.querySelector('.nav-item[href="#sec-conclusao"]');
  if (concNav) concNav.classList.toggle('done', concOk);

  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${total} seções`;
}

document.addEventListener('input', updateProgress);
document.addEventListener('change', updateProgress);

// ═══════════════════════════════════════════════════════
// AUTO-SAVE
// ═══════════════════════════════════════════════════════
function saveDraft() {
  const data = collectFormData();
  localStorage.setItem(`vistoria_draft_${currentImovel.id}`, JSON.stringify({ ...data, savedAt: new Date().toISOString() }));
  const ind = document.getElementById('autosave-indicator');
  const now = new Date();
  ind.innerHTML = `<i class="fa-solid fa-cloud-arrow-up" style="color:var(--green)"></i> Salvo ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function startAutosave() { setInterval(saveDraft, 30000); }

// ═══════════════════════════════════════════════════════
// COLETA DE DADOS
// ═══════════════════════════════════════════════════════
function collectFormData() {
  const comodos = getComodos(currentImovel);
  const comodosData = comodos.map((nome, idx) => ({
    nome,
    qtdVideos: (videoFiles[idx] || []).length,
    irregularidade: (document.getElementById('irreg-' + idx) || {}).value || ''
  }));

  const irregularidades = comodosData.filter(c => c.irregularidade.trim());

  return {
    imovelId: currentImovel.id,
    imovelNome: currentImovel.nome,
    data: document.getElementById('field-data').value,
    vistoriador: document.getElementById('field-vistoriador').value,
    comodos: comodosData,
    aptoPara: (document.querySelector('input[name="apto"]:checked') || {}).value || null,
    obsFinais: document.getElementById('field-obs-finais').value,
    nomeConc: document.getElementById('field-nome-conclusao').value,
    pendencias: irregularidades.map(c => ({ comodo: c.nome, descricao: c.irregularidade }))
  };
}

// ═══════════════════════════════════════════════════════
// ENVIO
// ═══════════════════════════════════════════════════════
function submitVistoria() {
  if (!document.getElementById('field-data').value) {
    showToast('Preencha a data da vistoria.');
    document.getElementById('sec-cab').classList.remove('collapsed');
    return;
  }
  if (!document.getElementById('field-vistoriador').value.trim()) {
    showToast('Informe o nome do vistoriador.');
    document.getElementById('sec-cab').classList.remove('collapsed');
    document.getElementById('field-vistoriador').focus();
    return;
  }
  if (!document.querySelector('input[name="apto"]:checked')) {
    showToast('Indique se o imóvel está apto para operação.');
    document.getElementById('sec-conclusao').classList.remove('collapsed');
    return;
  }
  if (!document.getElementById('field-nome-conclusao').value.trim()) {
    showToast('Informe o nome completo na conclusão.');
    document.getElementById('sec-conclusao').classList.remove('collapsed');
    document.getElementById('field-nome-conclusao').focus();
    return;
  }

  const data = collectFormData();
  showModal(data);
}

function showModal(data) {
  const aptoPara = data.aptoPara;
  const aptoLabel = { sim: '✓ Sim — Apto para operação', nao: '✗ Não — Pendências identificadas' }[aptoPara] || aptoPara;
  const aptoColor = { sim: 'var(--green)', nao: 'var(--red)' }[aptoPara] || 'var(--gray-500)';

  let html = `<div class="modal-section">
    <div class="modal-section-title">Resultado</div>
    <div style="font-size:17px;font-weight:700;color:${aptoColor}">${aptoLabel}</div>
    <div style="font-size:12px;color:var(--gray-400);margin-top:4px">${data.imovelNome} · ${data.data} · ${data.vistoriador}</div>
  </div>`;

  if (data.pendencias.length) {
    html += `<div class="modal-section">
      <div class="modal-section-title" style="color:var(--amber)"><i class="fa-solid fa-triangle-exclamation"></i> Irregularidades (${data.pendencias.length})</div>`;
    data.pendencias.forEach(p => {
      html += `<div class="modal-alert-item"><i class="fa-solid fa-circle-exclamation" style="color:var(--amber);flex-shrink:0"></i> <strong>${p.comodo}:</strong> ${p.descricao}</div>`;
    });
    html += '</div>';
  } else {
    html += `<div style="text-align:center;padding:20px 0;color:var(--green);font-weight:600">
      <i class="fa-solid fa-circle-check" style="font-size:32px;display:block;margin-bottom:8px"></i>
      Nenhuma irregularidade identificada!
    </div>`;
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function confirmarEnvio() {
  const data = collectFormData();
  const sentAt = new Date().toISOString();
  const baseId = `vistoria_${currentImovel.id}_${data.data}_${Date.now()}`;
  const id = `vistoria_final_${baseId}`;
  const registro = { ...data, id, status: 'enviado', sentAt };

  localStorage.setItem(id, JSON.stringify(registro));

  try {
    const lista = JSON.parse(localStorage.getItem('wc_vistorias') || '[]');
    lista.push({
      id,
      imovelId: currentImovel.id,
      imovelNome: currentImovel.nome || currentImovel.id,
      data: data.data,
      vistoriador: data.vistoriador,
      apto: data.aptoPara,
      pendencias: data.pendencias,
      sentAt
    });
    localStorage.setItem('wc_vistorias', JSON.stringify(lista));
  } catch(e) { console.warn('Erro ao salvar em wc_vistorias', e); }

  // Criar manutenções no imóvel para cada pendência
  if (data.pendencias.length) {
    try {
      const listaIm = JSON.parse(localStorage.getItem('wc_imoveis') || '[]');
      const imIdx = listaIm.findIndex(i => String(i.id) === String(currentImovel.id));
      if (imIdx >= 0) {
        if (!listaIm[imIdx].manutencoes) listaIm[imIdx].manutencoes = [];
        data.pendencias.forEach(p => {
          listaIm[imIdx].manutencoes.push({
            id: 'man_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
            comodo: p.comodo,
            descricao: p.descricao,
            status: 'pendente',
            custo: 0,
            criadoEm: sentAt,
            origem: 'vistoria',
            vistoriaId: id
          });
        });
        localStorage.setItem('wc_imoveis', JSON.stringify(listaIm));
      }
    } catch(e) { console.warn('Erro ao criar manutenções', e); }
  }

  document.getElementById('status-badge').className = 'status-badge status-sent';
  document.getElementById('status-badge').innerHTML = '<i class="fa-solid fa-circle-check"></i> Enviado';

  closeModal();
  showToast('Vistoria salva! Preparando PDF...');
  setTimeout(() => window.print(), 800);
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
